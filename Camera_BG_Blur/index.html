<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Background Blur</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />

  <!--
    MediaPipe Selfie Segmentation — License: Apache-2.0 (permissive, commercial-use OK)
    This is the same model family that powers Google Meet background blur.
    Loaded from the jsDelivr CDN. See README.md for the full license research.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"
          crossorigin="anonymous"></script>
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>Realtime Background Blur</h1>
      <p class="subtitle">MediaPipe Selfie Segmentation &middot; Apache-2.0 &middot; runs fully on-device</p>
    </header>

    <main class="stage">
      <!-- The webcam feed (hidden, used as inference source only) -->
      <video id="video" playsinline muted></video>

      <!-- The visible composited output -->
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="output"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay__card">
            <div class="spinner" id="spinner"></div>
            <p id="statusText">Click "Start camera" to begin</p>
          </div>
        </div>
        <div class="hud">
          <span class="badge" id="fpsBadge">-- FPS</span>
        </div>
        <div class="mic-meter" id="micMeter" title="Microphone input level">
          <svg class="mic-meter__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z" fill="currentColor"/>
          </svg>
          <div class="mic-meter__bar"><div class="mic-meter__fill" id="micFill"></div></div>
          <span class="mic-meter__label" id="micLabel">MIC</span>
        </div>
      </div>
    </main>

    <section class="controls" id="controls">
      <button id="startBtn" class="btn btn--primary">Start camera</button>

      <div class="control-group">
        <label class="switch">
          <input type="checkbox" id="effectEnabled" checked />
          <span class="slider"></span>
          <span class="switch__label">Effect on</span>
        </label>
      </div>

      <div class="control-group">
        <label for="mode">Background</label>
        <select id="mode">
          <option value="blur" selected>Blur</option>
          <option value="image">Image</option>
          <option value="color">Solid color</option>
          <option value="none">None (passthrough)</option>
        </select>
      </div>

      <div class="control-group" data-show="blur">
        <label for="blurAmount">Blur <span id="blurVal">14</span>px</label>
        <input type="range" id="blurAmount" min="0" max="40" value="14" />
      </div>

      <div class="control-group" data-show="image">
        <label for="bgUpload">Background image</label>
        <input type="file" id="bgUpload" accept="image/*" />
      </div>

      <div class="control-group" data-show="color">
        <label for="bgColor">Background color</label>
        <input type="color" id="bgColor" value="#1e1e2e" />
      </div>

      <div class="control-group">
        <label for="feather">Edge feather <span id="featherVal">3</span>px</label>
        <input type="range" id="feather" min="3" max="8" value="3" />
      </div>

      <div class="control-group">
        <label class="switch">
          <input type="checkbox" id="mirror" checked />
          <span class="slider"></span>
          <span class="switch__label">Mirror</span>
        </label>
      </div>
    </section>

    <footer class="app__footer">
      <p>All processing happens locally in your browser. No video ever leaves your device.</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
