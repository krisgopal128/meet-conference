<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Notebook base -->
  <rect x="4" y="2" width="24" height="28" rx="2" fill="#0974B0"/>
  <!-- Notebook spine -->
  <rect x="4" y="2" width="5" height="28" rx="2" fill="#065A8A"/>
  <!-- Rings -->
  <circle cx="6.5" cy="8" r="1.5" fill="#FFFFFF"/>
  <circle cx="6.5" cy="14" r="1.5" fill="#FFFFFF"/>
  <circle cx="6.5" cy="20" r="1.5" fill="#FFFFFF"/>
  <circle cx="6.5" cy="26" r="1.5" fill="#FFFFFF"/>
  <!-- Lines on page -->
  <rect x="12" y="10" width="12" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="12" y="15" width="12" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="12" y="20" width="10" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <!-- Graduation cap accent -->
  <polygon points="26,6 30,8 26,10 22,8" fill="#219E4A"/>
</svg>
