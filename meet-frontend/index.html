<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <meta name="description" content="LiveKit Video Conference Platform" />
    <meta name="theme-color" content="#1c1917" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <link rel="preconnect" href="https://livekit.phuket-tourist.com" />
    <link rel="preconnect" href="https://livekit.phuket-tourist.com" crossorigin />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), display-capture=(self), geolocation=()" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https://esm.sh https://fonts.gstatic.com;
        connect-src 'self' https: wss: ws:;
        media-src 'self' blob:;
        worker-src 'self' blob:;
        child-src 'self' blob:;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <title>Meet - Video Conference</title>
  </head>
  <body class="bg-surface-50 text-surface-800 dark:bg-surface-900 dark:text-surface-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
